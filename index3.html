<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Click Counter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }

        #count {
            font-size: 32px;
            margin: 20px;
        }
    </style>
</head>
<body>

    <h1>Simple Counter App</h1>

    <div id="count">0</div>

    <button onclick="increaseCount()">Increase</button>

    <script>
        let totalClicks = 0;

        function increaseCount() {
            totalClicks++;
            document.getElementById("count").textContent = totalClicks;
        }
    </script>

</body>
</html>
